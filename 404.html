<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#7fe7f5" />
    <title>Miwatasi</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="phone-shell" aria-label="Miwatasi demo app">
      <section class="hero-card glass-card">
        <div class="sky-art" aria-hidden="true">
          <span class="cloud cloud-one"></span>
          <span class="cloud cloud-two"></span>
          <span class="hill hill-back"></span>
          <span class="cliff"></span>
          <span class="grass"></span>
          <span class="seal">◔ᴥ◔</span>
        </div>
        <p class="eyebrow">Miwatasi</p>
        <h1>チームの経験と、<br />これからをみわたそう。</h1>
        <p class="lead">ふりかえりを、次のアサインの地図に。経験・希望・成長を蓄積し、面談やアサイン相談で見渡せます。</p>
      </section>

      <section class="quick-reflection glass-card" aria-labelledby="reflection-title">
        <div>
          <p class="eyebrow">1分ふりかえり</p>
          <h2 id="reflection-title">今回の経験を残す</h2>
        </div>
        <button class="primary-button" id="reflectButton" type="button">記録する</button>
      </section>

      <section class="map-section" aria-labelledby="map-title">
        <div class="section-heading">
          <p class="eyebrow">Experience map</p>
          <h2 id="map-title">チームの見晴らし</h2>
        </div>
        <div class="skill-grid" id="skillGrid"></div>
      </section>

      <section class="members-section" aria-labelledby="members-title">
        <div class="section-heading">
          <p class="eyebrow">Members</p>
          <h2 id="members-title">最近の経験ログ</h2>
        </div>
        <div class="member-list" id="memberList"></div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
